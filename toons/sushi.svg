<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><!-- Siamese Cat - slim elegant --><ellipse cx="100" cy="132" rx="40" ry="52" fill="#f0e6c8"/><circle cx="100" cy="78" r="38" fill="#f5edd5"/><!-- ears sharp --><polygon points="68,55 55,18 88,40" fill="#f5edd5"/><polygon points="132,55 145,18 112,40" fill="#f5edd5"/><polygon points="72,50 62,28 84,40" fill="#8b7355"/><polygon points="128,50 138,28 116,40" fill="#8b7355"/><!-- dark face mask --><ellipse cx="100" cy="82" rx="24" ry="18" fill="#6b5b45"/><!-- eyes --><circle cx="85" cy="74" r="8" fill="#fff"/><circle cx="115" cy="74" r="8" fill="#fff"/><circle cx="86" cy="73" r="5" fill="#4169e1"/><circle cx="114" cy="73" r="5" fill="#4169e1"/><circle cx="87" cy="72" r="3" fill="#111"/><!-- pink nose on dark mask --><ellipse cx="100" cy="84" rx="3.5" ry="2.5" fill="#e8a0a0"/><!-- whiskers --><line x1="72" y1="84" x2="25" y2="76" stroke="#8b7355" stroke-width="0.8"/><line x1="72" y1="88" x2="24" y2="90" stroke="#8b7355" stroke-width="0.8"/><line x1="128" y1="84" x2="175" y2="76" stroke="#8b7355" stroke-width="0.8"/><line x1="128" y1="88" x2="176" y2="90" stroke="#8b7355" stroke-width="0.8"/><!-- dark paws --><ellipse cx="80" cy="176" rx="12" ry="7" fill="#6b5b45"/><ellipse cx="120" cy="176" rx="12" ry="7" fill="#6b5b45"/><!-- collar (target) --><rect x="72" y="107" width="56" height="10" rx="5" fill="#e74c3c"/><circle cx="100" cy="112" r="4" fill="#ffd700"/></svg>