<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><!-- Ragdoll Cat - blue eyes, pointed --><ellipse cx="100" cy="130" rx="48" ry="50" fill="#f0e6d8"/><circle cx="100" cy="76" r="42" fill="#f5efe5"/><!-- ears with dark points --><polygon points="66,50 52,16 82,38" fill="#8b7d6b"/><polygon points="134,50 148,16 118,38" fill="#8b7d6b"/><polygon points="70,45 58,26 80,38" fill="#d4c0b0"/><polygon points="130,45 142,26 120,38" fill="#d4c0b0"/><!-- dark face mask (pointed) --><ellipse cx="100" cy="82" rx="22" ry="16" fill="#8b7d6b"/><!-- beautiful blue eyes --><circle cx="82" cy="72" r="11" fill="#fff"/><circle cx="118" cy="72" r="11" fill="#fff"/><circle cx="83" cy="71" r="7" fill="#5b9bd5"/><circle cx="117" cy="71" r="7" fill="#5b9bd5"/><ellipse cx="83" cy="70" rx="3" ry="5" fill="#111"/><ellipse cx="117" cy="70" rx="3" ry="5" fill="#111"/><!-- nose --><ellipse cx="100" cy="83" rx="3.5" ry="2.5" fill="#d4a0a0"/><!-- gentle smile --><path d="M93,87 Q100,92 107,87" fill="none" stroke="#a09080" stroke-width="1.2"/><!-- whiskers --><line x1="70" y1="78" x2="22" y2="72" stroke="#b8a898" stroke-width="0.8"/><line x1="70" y1="82" x2="20" y2="86" stroke="#b8a898" stroke-width="0.8"/><line x1="130" y1="78" x2="178" y2="72" stroke="#b8a898" stroke-width="0.8"/><line x1="130" y1="82" x2="180" y2="86" stroke="#b8a898" stroke-width="0.8"/><!-- fluffy tail --><path d="M55,170 Q15,160 10,120 Q8,90 40,95" fill="none" stroke="#f0e6d8" stroke-width="8" stroke-linecap="round"/><!-- paws --><ellipse cx="74" cy="173" rx="14" ry="8" fill="#f5efe5"/><ellipse cx="126" cy="173" rx="14" ry="8" fill="#f5efe5"/><!-- sweater/vest (target) --><rect x="65" y="100" width="70" height="28" rx="8" fill="#ff6b9d"/><rect x="65" y="100" width="70" height="6" rx="3" fill="#e85a8a"/><circle cx="100" cy="114" r="4" fill="#ffd700"/></svg>