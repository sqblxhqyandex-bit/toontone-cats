<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><!-- Sphynx / Hairless Cat --><ellipse cx="100" cy="128" rx="45" ry="48" fill="#e8c4a0"/><circle cx="100" cy="80" r="40" fill="#f0d0b0"/><!-- big dramatic ears --><polygon points="62,45 42,8 82,35" fill="#f0d0b0"/><polygon points="138,45 158,8 118,35" fill="#f0d0b0"/><polygon points="65,40 50,18 78,35" fill="#e0b0a0"/><polygon points="135,40 150,18 122,35" fill="#e0b0a0"/><!-- wrinkles --><path d="M75,55 Q80,52 85,55" fill="none" stroke="#d0a888" stroke-width="0.8"/><path d="M115,55 Q120,52 125,55" fill="none" stroke="#d0a888" stroke-width="0.8"/><path d="M90,50 Q100,47 110,50" fill="none" stroke="#d0a888" stroke-width="0.8"/><!-- big eyes --><circle cx="82" cy="72" r="13" fill="#fff"/><circle cx="118" cy="72" r="13" fill="#fff"/><circle cx="84" cy="71" r="8" fill="#ff69b4"/><circle cx="116" cy="71" r="8" fill="#ff69b4"/><ellipse cx="84" cy="70" rx="3" ry="5" fill="#111"/><ellipse cx="116" cy="70" rx="3" ry="5" fill="#111"/><!-- nose --><ellipse cx="100" cy="84" rx="4" ry="3" fill="#d0a090"/><!-- smirk --><path d="M93,89 Q100,95 107,89" fill="none" stroke="#b89880" stroke-width="1.5"/><!-- whiskers --><line x1="70" y1="80" x2="18" y2="72" stroke="#b89880" stroke-width="0.8"/><line x1="70" y1="84" x2="16" y2="88" stroke="#b89880" stroke-width="0.8"/><line x1="130" y1="80" x2="182" y2="72" stroke="#b89880" stroke-width="0.8"/><line x1="130" y1="84" x2="184" y2="88" stroke="#b89880" stroke-width="0.8"/><!-- bony body --><line x1="60" y1="110" x2="60" y2="160" stroke="#d0a888" stroke-width="0.6"/><line x1="140" y1="110" x2="140" y2="160" stroke="#d0a888" stroke-width="0.6"/><!-- paws --><ellipse cx="76" cy="170" rx="12" ry="7" fill="#e8c4a0"/><ellipse cx="124" cy="170" rx="12" ry="7" fill="#e8c4a0"/><!-- hat (target) --><polygon points="65,52 100,35 135,52" fill="#e74c3c"/><rect x="70" y="48" width="60" height="8" rx="3" fill="#c0392b"/><circle cx="100" cy="42" r="4" fill="#ffd700"/></svg>