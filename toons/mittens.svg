<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><!-- Tuxedo Cat - black & white --><ellipse cx="100" cy="128" rx="46" ry="50" fill="#222"/><circle cx="100" cy="75" r="42" fill="#333"/><!-- white chest --><ellipse cx="100" cy="120" rx="22" ry="28" fill="#f5f5f5"/><circle cx="100" cy="75" r="42" fill="#333"/><!-- ears --><polygon points="68,52 55,18 85,40" fill="#333"/><polygon points="132,52 145,18 115,40" fill="#333"/><polygon points="72,47 62,28 82,40" fill="#f5b0b0"/><polygon points="128,47 138,28 118,40" fill="#f5b0b0"/><!-- face - white patch on chin --><ellipse cx="100" cy="85" rx="12" ry="8" fill="#f5f5f5"/><!-- eyes --><circle cx="82" cy="70" r="10" fill="#fff"/><circle cx="118" cy="70" r="10" fill="#fff"/><circle cx="83" cy="69" r="6" fill="#60c040"/><circle cx="117" cy="69" r="6" fill="#60c040"/><ellipse cx="83" cy="68" rx="3" ry="5" fill="#111"/><ellipse cx="117" cy="68" rx="3" ry="5" fill="#111"/><!-- nose --><ellipse cx="100" cy="82" rx="4" ry="3" fill="#e8a0a0"/><!-- whiskers --><line x1="70" y1="78" x2="22" y2="72" stroke="#666" stroke-width="0.8"/><line x1="70" y1="82" x2="20" y2="86" stroke="#666" stroke-width="0.8"/><line x1="130" y1="78" x2="178" y2="72" stroke="#666" stroke-width="0.8"/><line x1="130" y1="82" x2="180" y2="86" stroke="#666" stroke-width="0.8"/><!-- white paws (gloves) --><ellipse cx="76" cy="174" rx="13" ry="8" fill="#f5f5f5"/><ellipse cx="124" cy="174" rx="13" ry="8" fill="#f5f5f5"/><!-- bow tie (target) --><polygon points="84,105 100,112 116,105 116,122 100,115 84,122" fill="#e74c3c"/><circle cx="100" cy="113.5" r="4" fill="#c0392b"/></svg>