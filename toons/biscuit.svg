<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><!-- British Shorthair - round chubby face --><ellipse cx="100" cy="125" rx="55" ry="48" fill="#b8c4c8"/><circle cx="100" cy="70" r="52" fill="#c8d4d8"/><!-- folded ears --><ellipse cx="55" cy="40" rx="18" ry="10" fill="#a8b4b8" transform="rotate(-20,55,40)"/><ellipse cx="145" cy="40" rx="18" ry="10" fill="#a8b4b8" transform="rotate(20,145,40)"/><!-- big round eyes copper/gold --><circle cx="80" cy="68" r="14" fill="#fff"/><circle cx="120" cy="68" r="14" fill="#fff"/><circle cx="82" cy="67" r="9" fill="#e8a828"/><circle cx="118" cy="67" r="9" fill="#e8a828"/><circle cx="84" cy="65" r="5" fill="#2a2a2a"/><circle cx="116" cy="65" r="5" fill="#2a2a2a"/><circle cx="86" cy="62" r="2" fill="#fff"/><circle cx="118" cy="62" r="2" fill="#fff"/><!-- tiny nose --><ellipse cx="100" cy="80" rx="5" ry="3.5" fill="#d4a0a0"/><!-- smile --><path d="M90,85 Q100,92 110,85" fill="none" stroke="#9a8a7a" stroke-width="1.5" stroke-linecap="round"/><!-- chubby cheeks --><ellipse cx="60" cy="80" rx="14" ry="10" fill="#d0d8dc" opacity="0.5"/><ellipse cx="140" cy="80" rx="14" ry="10" fill="#d0d8dc" opacity="0.5"/><!-- paws --><ellipse cx="72" cy="168" rx="16" ry="8" fill="#c8d4d8"/><ellipse cx="128" cy="168" rx="16" ry="8" fill="#c8d4d8"/><!-- red plaid scarf (target) --><rect x="60" y="100" width="80" height="25" rx="8" fill="#e74c3c"/><line x1="65" y1="108" x2="135" y2="108" stroke="#c0392b" stroke-width="2"/><line x1="65" y1="118" x2="135" y2="118" stroke="#c0392b" stroke-width="2"/><line x1="75" y1="100" x2="75" y2="125" stroke="#c0392b" stroke-width="1.5"/><line x1="90" y1="100" x2="90" y2="125" stroke="#c0392b" stroke-width="1.5"/><line x1="110" y1="100" x2="110" y2="125" stroke="#c0392b" stroke-width="1.5"/><line x1="125" y1="100" x2="125" y2="125" stroke="#c0392b" stroke-width="1.5"/></svg>