<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200"><!-- Burmese Cat - golden short hair muscular --><ellipse cx="100" cy="130" rx="48" ry="50" fill="#c89440"/><circle cx="100" cy="78" r="42" fill="#d4a050"/><!-- ears --><polygon points="68,52 55,18 85,40" fill="#d4a050"/><polygon points="132,52 145,18 115,40" fill="#d4a050"/><polygon points="72,47 62,28 82,40" fill="#d49070"/><polygon points="128,47 138,28 118,40" fill="#d49070"/><!-- big golden eyes --><circle cx="82" cy="72" r="11" fill="#fff"/><circle cx="118" cy="72" r="11" fill="#fff"/><circle cx="83" cy="71" r="7" fill="#f0c040"/><circle cx="117" cy="71" r="7" fill="#f0c040"/><ellipse cx="83" cy="70" rx="3" ry="5" fill="#111"/><ellipse cx="117" cy="70" rx="3" ry="5" fill="#111"/><!-- nose --><ellipse cx="100" cy="82" rx="4" ry="3" fill="#d49070"/><!-- sweet smile --><path d="M93,86 Q100,91 107,86" fill="none" stroke="#a07040" stroke-width="1.2"/><!-- whiskers --><line x1="70" y1="78" x2="22" y2="72" stroke="#b08050" stroke-width="0.8"/><line x1="70" y1="82" x2="20" y2="86" stroke="#b08050" stroke-width="0.8"/><line x1="130" y1="78" x2="178" y2="72" stroke="#b08050" stroke-width="0.8"/><line x1="130" y1="82" x2="180" y2="86" stroke="#b08050" stroke-width="0.8"/><!-- paws --><ellipse cx="74" cy="172" rx="13" ry="7" fill="#d4a050"/><ellipse cx="126" cy="172" rx="13" ry="7" fill="#d4a050"/><!-- turquoise collar (target) --><rect x="72" y="105" width="56" height="12" rx="6" fill="#1abc9c"/><circle cx="100" cy="111" r="4" fill="#16a085"/></svg>